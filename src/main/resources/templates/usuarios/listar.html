<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Usuarios</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <nav class="navbar navbar-dark bg-dark">
        <div class="container-fluid">
            <span class="navbar-brand mb-0 h1">📚 Tienda</span>
            <div>
                <a href="/" class="btn btn-light btn-sm">Inicio</a>
                <a href="/roles" class="btn btn-light btn-sm">Roles</a>
            </div>
        </div>
    </nav>
    
    <div class="container mt-5">
        <div class="d-flex justify-content-between mb-4">
            <h1>Usuarios</h1>
            <a href="/usuarios/nuevo" class="btn btn-primary">+ Nuevo</a>
        </div>
        
        <table class="table table-striped">
            <thead class="table-dark">
                <tr>
                    <th>ID</th><th>Email</th><th>Nombre</th><th>Apellido</th><th>Rol</th><th>Estado</th><th>Acciones</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="u : ${usuarios}">
                    <td th:text="${u.id}"></td>
                    <td th:text="${u.email}"></td>
                    <td th:text="${u.nombre}"></td>
                    <td th:text="${u.apellido}"></td>
                    <td th:text="${u.rol != null ? u.rol.nombre : '-'}"></td>
                    <td><span th:if="${u.activo}" class="badge bg-success">Activo</span><span th:unless="${u.activo}" class="badge bg-danger">Inactivo</span></td>
                    <td>
                        <a th:href="@{/usuarios/{id}/editar(id=${u.id})}" class="btn btn-sm btn-warning">Editar</a>
                        <a th:href="@{/usuarios/{id}/eliminar(id=${u.id})}" class="btn btn-sm btn-danger" onclick="return confirm('¿Eliminar?')">Eliminar</a>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>
</body>
</html>
