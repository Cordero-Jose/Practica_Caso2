<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Roles</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <nav class="navbar navbar-dark bg-dark">
        <div class="container-fluid">
            <span class="navbar-brand mb-0 h1">📚 Tienda</span>
            <div>
                <a href="/" class="btn btn-light btn-sm">Inicio</a>
                <a href="/usuarios" class="btn btn-light btn-sm">Usuarios</a>
            </div>
        </div>
    </nav>
    
    <div class="container mt-5">
        <div class="d-flex justify-content-between mb-4">
            <h1>Roles</h1>
            <a href="/roles/nuevo" class="btn btn-success">+ Nuevo</a>
        </div>
        
        <table class="table table-striped">
            <thead class="table-dark">
                <tr>
                    <th>ID</th><th>Nombre</th><th>Descripción</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="r : ${roles}">
                    <td th:text="${r.id}"></td>
                    <td th:text="${r.nombre}"></td>
                    <td th:text="${r.descripcion}"></td>
                </tr>
            </tbody>
        </table>
    </div>
</body>
</html>
